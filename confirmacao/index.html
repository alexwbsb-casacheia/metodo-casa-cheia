<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aprovado | Método Casa Cheia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#090909;--gold:#c9a84c;--green:#4fd18b;--text:#f5efe6;--muted:#a29a8f;--line:#242424}
*{box-sizing:border-box}body{margin:0;font-family:'Inter',system-ui,sans-serif;background:radial-gradient(circle at 50% -2%, rgba(79,209,139,.1), transparent 34%), radial-gradient(circle at 100% 90%, rgba(201,168,76,.06), transparent 40%), var(--bg);color:var(--text)}
main{min-height:100vh;display:grid;place-items:center;padding:28px} .shell{width:min(800px,100%);padding:1px;border-radius:28px;background:linear-gradient(160deg, rgba(79,209,139,.28) 0%, rgba(201,168,76,.18) 100%);box-shadow:0 32px 80px rgba(0,0,0,.55)}
.box{background:linear-gradient(180deg,#131313,#0c0c0c);border-radius:27px;padding:48px 40px;text-align:center;position:relative;overflow:hidden}
.box:after{content:'';position:absolute;top:-160px;right:-160px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle, rgba(79,209,139,.1), transparent 68%);pointer-events:none}
.logo{width:96px;height:96px;object-fit:contain;display:block;margin:0 auto 20px;filter:drop-shadow(0 14px 30px rgba(0,0,0,.4))}
.approved{display:inline-flex;align-items:center;gap:10px;padding:12px 22px;border-radius:999px;border:1px solid rgba(79,209,139,.42);background:rgba(79,209,139,.1);margin-bottom:20px;box-shadow:0 0 30px rgba(79,209,139,.08)}
.approved-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.approved-text{color:var(--green);font-size:13px;letter-spacing:.18em;text-transform:uppercase;font-weight:900}
h1{margin:0 0 8px;font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(2.4rem,5.5vw,4.2rem);line-height:1;letter-spacing:-.02em}
h1 em{font-style:italic;color:var(--gold)}
.sub{margin:14px auto 28px;max-width:50ch;color:var(--muted);font-size:16px;line-height:1.78}
.divider{width:72px;height:2px;background:linear-gradient(90deg,var(--green),rgba(79,209,139,.04));margin:20px auto 26px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:60px;padding:0 32px;border-radius:999px;background:linear-gradient(180deg,#d7b65a,#c9a84c);color:#101010;text-decoration:none;font-weight:900;font-size:1rem;letter-spacing:.01em;box-shadow:0 16px 40px rgba(201,168,76,.22), inset 0 1px 0 rgba(255,255,255,.28);transition:transform 180ms ease,box-shadow 180ms ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 20px 48px rgba(201,168,76,.3), inset 0 1px 0 rgba(255,255,255,.32)}
.micro{margin-top:18px;color:#6f685f;font-size:12px;letter-spacing:.05em}
/* --- SCRIBBLE EFFECTS --- */
.scribble-wrap{position:relative;display:inline-block}
.scribble-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:calc(100% + 36px);height:calc(100% + 28px);pointer-events:none;overflow:visible}
.scribble-path{fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:600;stroke-dashoffset:600;
  animation:draw-scribble 1.1s cubic-bezier(.4,0,.2,1) .35s forwards}
@keyframes draw-scribble{to{stroke-dashoffset:0}}
.scribble-under-wrap{position:relative;display:inline-block;width:100%}
.scribble-under-svg{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);width:260px;height:32px;pointer-events:none;overflow:visible}
.scribble-under-path{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:700;stroke-dashoffset:700;
  animation:draw-scribble 1.2s cubic-bezier(.4,0,.2,1) .7s forwards}
</style>
</head>
<body><main><section class="shell"><div class="box">
<img class="logo" src="../assetslogo-metodo-casa-cheia.png.png" alt="Método Casa Cheia">
<div class="scribble-wrap">
<div class="approved"><span class="approved-dot"></span><span class="approved-text">APROVADO!</span></div>
<svg class="scribble-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
  <path class="scribble-path" d="M12,30 C10,10 30,4 100,4 C170,4 192,10 192,30 C192,50 170,56 100,56 C30,56 8,50 10,32 C12,20 20,6 100,6"/>
</svg>
</div>
<h1>Seu negócio tem todos<br>os requisitos para<br><em>participar.</em></h1>
<div class="scribble-under-wrap">
<div class="divider"></div>
<svg class="scribble-under-svg" viewBox="0 0 260 32" preserveAspectRatio="none">
  <path class="scribble-under-path" d="M10,20 C40,8 80,6 130,10 C180,14 230,8 252,18 C240,26 180,28 130,24 C80,20 40,22 10,20"/>
</svg>
</div>
<p class="sub">Seu perfil foi validado pela equipe do Método Casa Cheia. Agora é só agendar a conversa e alinhar os próximos passos.</p>
<a class="btn" href="https://calendly.com/alexwbsb/conversa-estrategica" target="_blank" rel="noopener">
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
Agendar conversa estratégica</a>
<div class="micro">Seleção criteriosa&nbsp;&nbsp;•&nbsp;&nbsp;Atendimento prioritário&nbsp;&nbsp;•&nbsp;&nbsp;Vagas limitadas</div>
</div></section></main></body></html>
