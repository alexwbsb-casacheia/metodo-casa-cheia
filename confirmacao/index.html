<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aprovado | Método Casa Cheia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080808;color:#edeae3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:540px;width:100%;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.28);border-radius:999px;padding:8px 20px;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#c9a84c;margin-bottom:32px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#c9a84c;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.icon{font-size:2.8rem;margin-bottom:16px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,7vw,3.4rem);font-weight:700;line-height:1.05;color:#f5efe6;margin-bottom:12px}
h1 em{color:#c9a84c;font-style:italic}
.sub{font-size:1.05rem;line-height:1.72;color:rgba(255,255,255,.60);margin-bottom:36px;max-width:420px;margin-left:auto;margin-right:auto}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:60px;padding:0 36px;border-radius:999px;background:linear-gradient(180deg,#d8b552 0%,#c9a84c 100%);color:#111;font-size:1.05rem;font-weight:700;text-decoration:none;box-shadow:0 10px 30px rgba(201,168,76,.22),inset 0 1px 0 rgba(255,255,255,.28);transition:transform 180ms ease,box-shadow 180ms ease,filter 180ms ease;margin-bottom:16px;width:100%;max-width:360px}
.btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(201,168,76,.32);filter:brightness(1.04)}
.meta{font-size:.82rem;color:rgba(255,255,255,.26);line-height:1.6}
.divider{width:56px;height:2px;background:linear-gradient(90deg,#c9a84c,transparent);margin:28px auto}
</style>
</head>
<body>
<div class="card">
  <div class="badge"><span class="badge-dot"></span> Seleção aprovada</div>
  <div class="icon">✦</div>
  <h1>Seu negócio tem todos<br><em>os requisitos para participar.</em></h1>
  <div class="divider"></div>
  <p class="sub">Seu perfil foi validado pela equipe do Método Casa Cheia. Agora é só agendar a conversa e alinhar os próximos passos.</p>
  <a href="SEU-LINK-CALENDLY-AQUI" target="_blank" rel="noopener noreferrer" class="btn">
    🗓 Agendar conversa estratégica
  </a>
  <p class="meta">Seleção criteriosa &bull; Atendimento prioritário &bull; Vagas limitadas</p>
</div>
</body>
</html>
